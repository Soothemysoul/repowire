apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}
  annotations:
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
  labels:
    app: {{ .Release.Name }}
spec:
  parentRefs:
    - kind: Gateway
      name: clusterkit-gateway
      namespace: clusterkit
  hostnames:
    - {{ .Values.hostname }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ .Release.Name }}
          port: {{ .Values.service.port }}
